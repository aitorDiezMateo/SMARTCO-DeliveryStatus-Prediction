name: smartco-delivery-status
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.12
  - pip
  # Core Data Science (Versiones compatibles con 3.12)
  - numpy>=1.26.4
  - scipy>=1.12
  - pandas>=2.2
  - scikit-learn>=1.4
  - xgboost>=2.0  # XGBoost 2.0+ tiene mejor soporte nativo para GPU
  - optuna
  - imbalanced-learn
  # Visualización
  - matplotlib>=3.8
  - seaborn
  - missingno
  # Herramientas de sistema
  - mkl
  - tqdm
  - psutil
  - ipykernel
  - pip:
    - joblib